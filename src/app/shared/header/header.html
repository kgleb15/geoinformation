<div class = "header">
  <div class="top-row">
    <h1>ГЕОИНФОРМАЦИЯ</h1>
    <mat-radio-group [(ngModel)]="selectedLang" (ngModelChange)="onLangChange($event)" class= "lang-switch">
      <mat-radio-button value="ru" class="lang-option">RU</mat-radio-button>
      <mat-radio-button value="en" class="lang-option">EN</mat-radio-button>
    </mat-radio-group>
  </div>


  <nav class="tabs">
    <a routerLink="/countries" routerLinkActive="active" class="tab">Страны</a>
    <a routerLink="/cities" routerLinkActive="active" class="tab">Города</a>
  </nav>
</div>
