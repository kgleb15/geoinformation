<app-header />
<div class="container">

  <div class="filters">
    <mat-form-field appearance="outline" class="search-country">
      <mat-select
        [(ngModel)]="selectedCountry"
        (ngModelChange)="onCountryChange()"
        placeholder="Страны"
        panelClass="custom-select-panel">
          <mat-option value="">Все страны</mat-option>
          @for (country of countries; track country.code) {
            <mat-option [value]="country.code">{{country.name}}</mat-option>
          }
      </mat-select>
    </mat-form-field>

    <app-search-input [(value)]="searchName" (searchChange)="onSearchChanged()"/>
  </div>

  @if (isLoading) {
    <div class="spinner-container">
      <mat-spinner diameter="60"/>
    </div>
  } @else {
    <table mat-table [dataSource]="items">

      <ng-container matColumnDef="country">
        <th mat-header-cell *matHeaderCellDef>Страна</th>
        <td mat-cell *matCellDef="let city">{{ city.country }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Наименование</th>
        <td mat-cell *matCellDef="let city">{{ city.name }}</td>
      </ng-container>

      <ng-container matColumnDef="region">
        <th mat-header-cell *matHeaderCellDef>Регион</th>
        <td mat-cell *matCellDef="let city">{{ city.region }}</td>
      </ng-container>

      <ng-container matColumnDef="population">
        <th mat-header-cell *matHeaderCellDef>Население</th>
        <td mat-cell *matCellDef="let city">{{ city.population | number}}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="action-column"></th>
        <td mat-cell *matCellDef="let city" class="action-column">
          <button mat-icon-button (click)="onEdit(city)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="onView(city)">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
    </table>
  }

  <app-paginator
    [class.hidden]="isLoading"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [totalCount]="totalCount"
    (pageChange)="onPageChange($event)"
    class="pagination-left"
  />
</div>
