<div class="dialog-content">
  <h2>{{data.name}}</h2>

  <div class="info-grid">
    <div class="info-item">
      <div class="label">Страна</div>
      <div class="value">{{data.country}}</div>
    </div>
    <div class="info-item">
      <div class="label">Регион</div>
      <div class="value">{{data.region}}</div>
    </div>
    <div class="info-item">
      <div class="label">Население</div>
      <div class="value">{{data.population | number}}</div>
    </div>
    <div class="info-item">
      <div class="label">Дата основания</div>
      <div class="value">---</div>
    </div>
    <div class="info-item">
      <div class="label">Долгота</div>
      <div class="value">{{data.longitude}}</div>
    </div>
    <div class="info-item">
      <div class="label">Широта</div>
      <div class="value">{{data.latitude}}</div>
    </div>
  </div>

  <div class="actions">
    <button mat-stroked-button (click)="close()">Закрыть</button>
  </div>
</div>
