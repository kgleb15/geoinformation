<app-header />
<div class="container">
  @if (isLoading) {
    <div class="spinner-container">
      <mat-spinner diameter="60"/>
    </div>
  } @else {
    <table mat-table [dataSource]="countries">
      <ng-container matColumnDef="wikiDataId">
        <th mat-header-cell *matHeaderCellDef>ID страны</th>
        <td mat-cell *matCellDef="let country">{{country.wikiDataId}}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let country">
          <button mat-icon-button (click) = "goToCities(country.code)">
            <mat-icon>open_in_new</mat-icon>
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Наименование</th>
        <td mat-cell *matCellDef="let country">{{ country.name }}</td>
      </ng-container>

      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Код страны</th>
        <td mat-cell *matCellDef="let country">{{ country.code }}</td>
      </ng-container>

      <ng-container matColumnDef="currencyCodes">
        <th mat-header-cell *matHeaderCellDef>Коды валют</th>
        <td mat-cell *matCellDef="let country">{{ country.currencyCodes.join(', ')}}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>
    </table>
  }

  <app-paginator
    [class.hidden]="isLoading"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [totalCount]="totalCount"
    (pageChange)="onPageChange($event)"
    class="pagination-left"
  />
</div>
