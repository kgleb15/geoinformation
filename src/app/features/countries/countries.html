<app-header />
<div class="container">

  <div class="filters">
    <app-search-input [(value)]="searchName" (valueChange)="onSearchChanged()"/>
  </div>

  @if (isLoading()) {
    <div class="spinner-container">
      <mat-spinner diameter="60"/>
    </div>
  }
  <table mat-table [dataSource]="items()" matSort (matSortChange)="onSortChanged($event)" [class.hidden]="isLoading()">
    <ng-container matColumnDef="wikiDataId">
      <th mat-header-cell *matHeaderCellDef>{{ 'countries.columns.id' | translate }}</th>
      <td mat-cell *matCellDef="let country">{{country.wikiDataId}}</td>
    </ng-container>

    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef class="action-column"></th>
      <td mat-cell *matCellDef="let country" class="action-column">
        <button mat-icon-button (click) = "goToCities(country.code)">
          <mat-icon>open_in_new</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'countries.columns.name' | translate }}</th>
      <td mat-cell *matCellDef="let country">{{ country.name }}</td>
    </ng-container>

    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'countries.columns.code' | translate }}</th>
      <td mat-cell *matCellDef="let country">{{ country.code }}</td>
    </ng-container>

    <ng-container matColumnDef="currencyCodes">
      <th mat-header-cell *matHeaderCellDef>{{ 'countries.columns.currencies' | translate }}</th>
      <td mat-cell *matCellDef="let country">{{ country.currencyCodes.join(', ')}}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
    <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>
  </table>

  <mat-paginator
    [class.hidden]="isLoading()"
    [length]="totalCount()"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[5, 10, 20, 40, 80]"
    (page)="onPaginatorChanged($event)"
    showFirstLastButtons
    class="pagination-left"
  />
</div>
